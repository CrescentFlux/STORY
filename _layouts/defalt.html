<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} · 故事标本馆</title>
    <!-- 使用更优雅的字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">
    <style>
        /* 基础重置与优雅的排版 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #faf9f8;
            color: #1d1d1f;
            font-family: "Source Serif 4", "Georgia", "Times New Roman", serif;
            font-weight: 400;
            line-height: 1.8;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
        }

        /* --- 文章头部：极简但充满秩序感 --- */
        .article-header {
            margin-bottom: 3.5rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #e5e5e5;
            position: relative;
        }

        /* 一个小小的装饰线，增加细节 */
        .article-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 60px;
            height: 2px;
            background-color: #1d1d1f;
            transition: width 0.3s ease;
        }

        .article-header:hover::after {
            width: 120px;
        }

        .article-header h1 {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-weight: 600;
            font-size: 2.6rem;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            color: #1d1d1f;
        }

        .article-header .meta {
            font-family: "Inter", sans-serif;
            font-size: 0.85rem;
            font-weight: 400;
            color: #8e8e93;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* 一个精致的小圆点分隔符 */
        .meta-sep {
            display: inline-block;
            width: 4px;
            height: 4px;
            background-color: #c6c6c8;
            border-radius: 50%;
        }

        /* --- 正文内容：极致的阅读体验 --- */
        .content {
            font-size: 1.1rem;
            color: #2c2c2e;
        }

        .content p {
            margin-bottom: 1.5rem;
        }

        /* 首字母微微下沉，增添一丝经典感 */
        .content p:first-of-type::first-letter {
            font-size: 3.2rem;
            font-weight: 600;
            float: left;
            line-height: 1;
            margin-right: 0.4rem;
            margin-top: 0.1rem;
            color: #1d1d1f;
            font-family: "Inter", sans-serif;
        }

        /* 对引号或特殊段落的微妙修饰 */
        .content blockquote {
            margin-left: 0;
            padding-left: 1.5rem;
            border-left: 3px solid #d2d2d6;
            color: #5e5e62;
            font-style: italic;
        }

        /* --- 文章底部：简洁的返回链接 --- */
        .article-footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid #e5e5e5;
            font-family: "Inter", sans-serif;
            font-size: 0.9rem;
        }

        .article-footer a {
            color: #1d1d1f;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }

        .article-footer a:hover {
            border-bottom-color: #1d1d1f;
        }

        /* 响应式微调 */
        @media (max-width: 500px) {
            body { padding: 1.5rem 1rem; }
            .article-header h1 { font-size: 2rem; }
            .content { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <article>
            <header class="article-header">
                <h1>{{ page.title }}</h1>
                <div class="meta">
                    <span>{{ page.date | date: "%Y年%m月%d日" }}</span>
                    <span class="meta-sep"></span>
                    <span>📖 约需 {{ page.read_time | default: 1 }} 分钟</span>
                </div>
            </header>

            <div class="content">
                {{ content }}
            </div>

            <footer class="article-footer">
                <a href="/">← 返回故事列表</a>
            </footer>
        </article>
    </div>
</body>
</html>
